<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Feeding Tracker</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#4CAF50">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f5f7fb;
text-align:center;
padding:20px;
}

h1{
color:#333;
}

.card{
background:white;
padding:20px;
border-radius:14px;
width:340px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.bigbutton{
padding:18px;
font-size:20px;
background:#4CAF50;
color:white;
border:none;
border-radius:12px;
width:100%;
margin-top:10px;
}

input,select{
padding:10px;
margin:5px;
width:90%;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:6px;
}

ul{
list-style:none;
padding:0;
margin-top:20px;
}

li{
background:white;
padding:10px;
margin:8px 0;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
font-size:14px;
}

.stats{
margin-top:10px;
color:#555;
}

.reminder{
margin-top:10px;
font-weight:bold;
color:#444;
}

</style>
</head>

<body>

<h1>🍼 Feeding Tracker</h1>

<div class="card">

<button class="bigbutton" onclick="quickFeed()">Record Feeding</button>

<select id="type">
<option>Left</option>
<option>Right</option>
<option>Bottle</option>
</select>

<input id="amount" placeholder="Amount ml (optional)">

<hr>

<input id="interval" placeholder="Reminder hours (ex: 2.5)">

<div class="reminder" id="reminder"></div>

<div class="stats" id="stats"></div>

<ul id="feedList"></ul>

</div>

<script>

let feeds = JSON.parse(localStorage.getItem("feeds")) || [];
let interval = localStorage.getItem("interval") || 3;

document.getElementById("interval").value = interval;

function save(){

localStorage.setItem("feeds",JSON.stringify(feeds));
localStorage.setItem("interval",document.getElementById("interval").value);

}

function quickFeed(){

const type=document.getElementById("type").value;
const amount=document.getElementById("amount").value;

const feed={
time:Date.now(),
type:type,
amount:amount
};

feeds.unshift(feed);

save();
render();

}

function removeFeed(i){
feeds.splice(i,1);
save();
render();
}

function timeDiff(t1,t2){

const diff=Math.floor((t1-t2)/60000);

const h=Math.floor(diff/60);
const m=diff%60;

return h+"h "+m+"m";

}

function render(){

const list=document.getElementById("feedList");
list.innerHTML="";

feeds.forEach((f,i)=>{

let intervalText="";

if(i<feeds.length-1){

intervalText=" | interval "+timeDiff(f.time,feeds[i+1].time);

}

const li=document.createElement("li");

li.innerHTML=
new Date(f.time).toLocaleTimeString()
+" | "+f.type
+" | "+f.amount+" ml"
+intervalText
+" <button onclick='removeFeed("+i+")'>❌</button>";

list.appendChild(li);

});

updateStats();
updateReminder();

}

function updateStats(){

let today=0;

const todayDate=new Date().toDateString();

feeds.forEach(f=>{
if(new Date(f.time).toDateString()==todayDate){
today++;
}
});

let last="";

if(feeds.length>0){

const min=Math.floor((Date.now()-feeds[0].time)/60000);

const h=Math.floor(min/60);
const m=min%60;

last="Last feeding "+h+"h "+m+"m ago";

}

document.getElementById("stats").innerHTML=
"Today "+today+" feedings<br>"+last;

}

function updateReminder(){

if(feeds.length==0) return;

interval=document.getElementById("interval").value;

const next=feeds[0].time+interval*60*60*1000;

const diff=next-Date.now();

if(diff<=0){

document.getElementById("reminder").innerText="🍼 Feeding due";

return;

}

const m=Math.floor(diff/60000);
const s=Math.floor((diff%60000)/1000);

document.getElementById("reminder").innerText=
"Next feeding in "+m+"m "+s+"s";

}

setInterval(updateReminder,1000);

render();

</script>

</body>
</html>
